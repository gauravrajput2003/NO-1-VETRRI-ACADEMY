<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vettri Academy Landing</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 10% 10%, #d8efff 0%, transparent 32%),
        radial-gradient(circle at 90% 90%, #d9e9ff 0%, transparent 36%),
        #edf5ff;
      display: grid;
      place-items: center;
      padding: 18px;
      font-family: Arial, sans-serif;
    }
    .frame {
      width: min(100%, 1024px);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 26px 70px rgba(9, 38, 94, 0.22);
      border: 1px solid rgba(17, 71, 160, 0.12);
      background: #ffffff;
    }
    .hero-img {
      display: block;
      width: 100%;
      height: auto;
    }
    @media (max-width: 640px) {
      body { padding: 10px; }
      .frame { border-radius: 14px; }
    }
  </style>
</head>
<body>
  <main class="frame" aria-label="Vettri Academy Landing Banner">
    <img
      class="hero-img"
      src="./assets/vettri-landing.png"
      alt="Vettri Academy - Transform Your Future With Expert Coaching"
    />
  </main>
</body>
</html>
